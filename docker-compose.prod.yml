services:
  db:
    restart: always
    volumes:
      - /opt/gemvault/data/postgres:/var/lib/postgresql/data

  minio:
    restart: always
    ports: []  # Remove dev ports — MinIO is only reachable inside Docker network
    volumes:
      - /opt/gemvault/data/minio:/data

  api:
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production

  frontend:
    restart: always

  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/gemvault/certs:/etc/nginx/certs:ro
