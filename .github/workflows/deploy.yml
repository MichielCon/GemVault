name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: GITHUB_SHA
          script: |
            set -e
            cd /opt/gemvault

            # Tag current images as previous (rollback targets)
            docker tag gemvault-api:latest gemvault-api:previous 2>/dev/null || true
            docker tag gemvault-frontend:latest gemvault-frontend:previous 2>/dev/null || true

            git pull origin main

            # Build and tag new images with git SHA
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build
            docker tag gemvault-api:latest gemvault-api:$GITHUB_SHA 2>/dev/null || true
            docker tag gemvault-frontend:latest gemvault-frontend:$GITHUB_SHA 2>/dev/null || true

            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            # Keep :previous and :$GITHUB_SHA; prune only dangling images
            docker image prune -f

      - name: Health check
        run: |
          sleep 60
          curl --fail --retry 12 --retry-delay 15 --retry-all-errors https://${{ secrets.VPS_HOST }}/api/health || exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /opt/gemvault
            if docker image inspect gemvault-api:previous >/dev/null 2>&1; then
              echo "Rolling back to previous images..."
              docker tag gemvault-api:previous gemvault-api:latest
              docker tag gemvault-frontend:previous gemvault-frontend:latest
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
              echo "Rollback complete"
            else
              echo "No previous image found — manual intervention required"
            fi
